<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="動作評価">
  <title>スポーツ整形 動作評価</title>
  <style>
    * { box-sizing:border-box;margin:0;padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f0f4f8;color:#1a202c; }

    #loadingOverlay { position:fixed;inset:0;background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999; }
    .spinner { width:48px;height:48px;border:4px solid #e2e8f0;border-top-color:#2b6cb0;border-radius:50%;animation:spin .8s linear infinite; }
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-text { margin-top:16px;color:#4a5568;font-size:15px;text-align:center;padding:0 20px; }

    header { background:#1a365d;color:white;padding:12px 16px;display:flex;align-items:center;justify-content:space-between; }
    header h1 { font-size:16px;font-weight:700; }
    header span { font-size:11px;opacity:.8; }

    .tabs { display:flex;background:white;border-bottom:2px solid #e2e8f0; }
    .tab { flex:1;padding:12px 8px;text-align:center;font-size:14px;font-weight:600;color:#718096;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px; }
    .tab.active { color:#2b6cb0;border-bottom-color:#2b6cb0; }

    .move-bar { display:flex;gap:8px;padding:10px 14px;overflow-x:auto;background:white;border-bottom:1px solid #e2e8f0;-webkit-overflow-scrolling:touch; }
    .move-bar::-webkit-scrollbar { display:none; }
    .move-btn { flex-shrink:0;padding:7px 15px;border:2px solid #e2e8f0;border-radius:20px;background:white;font-size:13px;font-weight:600;color:#4a5568;cursor:pointer;white-space:nowrap; }
    .move-btn.active { background:#2b6cb0;border-color:#2b6cb0;color:white; }

    .panel { display:none; }
    .panel.active { display:block; }

    .view-toggle { display:flex;background:white;border-bottom:1px solid #e2e8f0;padding:8px 14px;gap:8px; }
    .vtb { flex:1;padding:8px;border:2px solid #e2e8f0;border-radius:8px;background:white;font-size:13px;font-weight:600;color:#718096;cursor:pointer; }
    .vtb.active { background:#2b6cb0;color:white;border-color:#2b6cb0; }

    .media-wrap { position:relative;width:100%;background:#000;overflow:hidden; }
    .media-wrap canvas { display:block;width:100%;height:auto;max-height:52vh;object-fit:contain; }
    .media-wrap video { display:none; }
    .phase-badge { position:absolute;top:8px;left:8px;background:rgba(0,0,0,.65);color:white;padding:4px 11px;border-radius:18px;font-size:12px;font-weight:700;pointer-events:none;transition:background .2s; }
    .phase-badge.alert { background:rgba(197,48,48,.9); }
    .flip-btn { position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);border:none;color:white;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer; }

    .dual-panel { display:grid;grid-template-columns:1fr 1fr;gap:2px;background:#cbd5e0;border-top:2px solid #cbd5e0; }
    .vid-pane { background:white;display:flex;flex-direction:column; }
    .pane-hdr { background:#2b6cb0;color:white;text-align:center;padding:5px 4px;font-size:12px;font-weight:700;letter-spacing:.05em; }
    .vid-pane .media-wrap canvas { max-height:30vh; }
    .mini-bar { display:none;align-items:center;gap:3px;padding:5px 6px;background:#1a202c; }
    .mini-bar button { background:rgba(255,255,255,.15);border:none;color:white;font-size:18px;cursor:pointer;padding:4px 8px;line-height:1;border-radius:6px; }
    .mini-prog { flex:1;height:4px;background:#4a5568;border-radius:2px;cursor:pointer; }
    .mini-prog div { height:100%;background:#63b3ed;border-radius:2px;pointer-events:none;width:0%; }
    .mini-time { color:#a0aec0;font-size:10px;white-space:nowrap; }
    .pane-btn { margin:7px;padding:8px 4px;background:#2b6cb0;color:white;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer; }

    .controls { display:flex;gap:10px;padding:12px 14px;background:white; }
    .btn { flex:1;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer; }
    .btn-primary { background:#2b6cb0;color:white; }
    .btn-danger  { background:#e53e3e;color:white; }
    .btn-summary { background:#2c7a7b;color:white; }
    .btn:disabled { opacity:.38;pointer-events:none; }

    .tip { background:#ebf8ff;border-left:4px solid #4299e1;padding:8px 14px;margin:8px 14px;border-radius:0 8px 8px 0;font-size:12px;line-height:1.7;color:#2c5282; }
    .view-tag { display:inline-block;padding:1px 7px;border-radius:6px;font-size:11px;font-weight:700;margin-right:4px; }
    .vt-side  { background:#e9d8fd;color:#553c9a; }
    .vt-front { background:#c6f6d5;color:#22543d; }
    .vt-both  { background:#fefcbf;color:#744210; }

    .metrics { display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 14px 14px; }
    .sec-label { grid-column:1/-1;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#4a5568;padding:6px 0 2px;border-bottom:1px solid #e2e8f0;margin-top:2px; }
    .card { background:white;border-radius:11px;padding:11px;box-shadow:0 1px 3px rgba(0,0,0,.08); }
    .card.wide { grid-column:1/-1; }
    .card-label { font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#718096;margin-bottom:4px; }
    .card-val { font-size:26px;font-weight:800;color:#1a202c;line-height:1; }
    .card-val .unit { font-size:13px;font-weight:400;color:#a0aec0; }
    .badge { display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;margin-top:4px; }
    .ok   { background:#c6f6d5;color:#22543d; }
    .warn { background:#fefcbf;color:#744210; }
    .ng   { background:#fed7d7;color:#742a2a; }
    .na   { background:#e2e8f0;color:#718096; }

    /* ── Lightbox ── */
    .lightbox { position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:900;display:flex;flex-direction:column;align-items:center;justify-content:center; }
    #lbImg { max-width:100%;max-height:calc(100vh - 90px);object-fit:contain;touch-action:none;transform-origin:center center; }
    #lbCanvas { max-width:100%;max-height:calc(100vh - 90px);display:none; }
    .lightbox-close { position:absolute;top:14px;right:14px;background:rgba(255,255,255,.2);border:none;color:white;font-size:22px;padding:6px 14px;border-radius:10px;cursor:pointer;z-index:1; }
    .lb-controls { display:none;gap:10px;padding:10px 16px;background:rgba(255,255,255,.1);border-radius:12px;margin-top:10px;align-items:center; }
    .lb-controls button { background:rgba(255,255,255,.2);border:none;color:white;font-size:22px;padding:7px 14px;border-radius:8px;cursor:pointer; }
    .lb-time { color:#a0aec0;font-size:13px;min-width:44px;text-align:center; }
    .media-wrap canvas { cursor:zoom-in; }
    .peak-thumb { cursor:zoom-in; }

    /* ── Summary modal ── */
    .modal { position:fixed;inset:0;z-index:600;display:flex;flex-direction:column;justify-content:flex-end; }
    .modal-bg { position:absolute;inset:0;background:rgba(0,0,0,.5); }
    .modal-sheet { position:relative;background:white;border-radius:18px 18px 0 0;max-height:84vh;overflow-y:auto; }
    .modal-hdr { display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #e2e8f0;position:sticky;top:0;background:white;z-index:1; }
    .modal-hdr h2 { font-size:16px;font-weight:700; }
    .modal-hdr button { background:none;border:none;font-size:22px;color:#a0aec0;cursor:pointer;line-height:1; }
    .modal-body { padding:12px 14px 32px; }

    .peak-row { display:flex;align-items:flex-start;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f7fafc; }
    .peak-info .card-label { margin-bottom:2px; }
    .peak-info .card-val { font-size:22px; }
    .jump-btn { background:#ebf8ff;border:none;color:#2b6cb0;padding:6px 11px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0; }
    .step-group { display:flex;gap:4px;justify-content:flex-end;margin-top:4px; }
    .peak-thumb { width:100px;border-radius:8px;display:block;margin-bottom:4px; }
    .chart-wrap { margin:6px 0 14px; }
    .chart-label { font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#4a5568;margin-bottom:3px; }
    .chart-cv { width:100%;height:80px;display:block;border-radius:8px;cursor:pointer;background:#f7fafc; }

    .comment-card { border-radius:10px;padding:12px;margin-bottom:8px; }
    .comment-card.ok   { background:#f0fff4;border-left:4px solid #38a169; }
    .comment-card.warn { background:#fffbeb;border-left:4px solid #d69e2e; }
    .comment-card.ng   { background:#fff5f5;border-left:4px solid #e53e3e; }
    .comment-title { font-size:13px;font-weight:700;margin-bottom:5px; }
    .comment-text  { font-size:12px;line-height:1.75;color:#4a5568; }

    .overall-box { border-radius:12px;padding:14px;margin-bottom:12px;text-align:center; }
    .overall-box.ok   { background:#f0fff4; }
    .overall-box.warn { background:#fffbeb; }
    .overall-box.ng   { background:#fff5f5; }
    .overall-icon { font-size:36px; }
    .overall-label { font-size:15px;font-weight:700;margin-top:6px; }

    input[type=file] { display:none; }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">AIモデル読み込み中...<br><small style="color:#a0aec0">初回は少し時間がかかります</small></div>
</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" style="display:none">
  <button class="lightbox-close" onclick="closeLightbox()">&#10005;</button>
  <img id="lbImg" src="" alt="" onclick="event.stopPropagation()">
  <canvas id="lbCanvas" onclick="event.stopPropagation()"></canvas>
  <div class="lb-controls" id="lbControls" onclick="event.stopPropagation()">
    <button onclick="lbStep(-1)">&#9664;&#9664;</button>
    <button onclick="lbTogglePlay()" id="lbPlayBtn">&#9654;</button>
    <button onclick="lbStep(1)">&#9654;&#9654;</button>
    <span class="lb-time" id="lbTime">0:00</span>
  </div>
</div>

<!-- Summary modal -->
<div class="modal" id="summaryModal" style="display:none">
  <div class="modal-bg" onclick="closeSummary()"></div>
  <div class="modal-sheet">
    <div class="modal-hdr">
      <h2 id="summaryTitle">解析サマリー</h2>
      <button onclick="closeSummary()">&#10005;</button>
    </div>
    <div class="modal-body" id="summaryBody"></div>
  </div>
</div>

<header>
  <h1>スポーツ整形 動作評価</h1>
  <span>AI姿勢解析</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('cam')">カメラ (リアルタイム)</div>
  <div class="tab" onclick="switchTab('vid')">動画解析 (側面+正面)</div>
</div>

<div class="move-bar">
  <button class="move-btn active" data-move="squat"     onclick="selectMove('squat')">スクワット</button>
  <button class="move-btn"        data-move="lunge"     onclick="selectMove('lunge')">ランジ</button>
  <button class="move-btn"        data-move="singleLeg" onclick="selectMove('singleLeg')">片足SQ</button>
  <button class="move-btn"        data-move="jump"      onclick="selectMove('jump')">ジャンプ着地</button>
  <button class="move-btn"        data-move="cut"       onclick="selectMove('cut')">切り返し</button>
  <button class="move-btn"        data-move="stop"      onclick="selectMove('stop')">ストップ</button>
</div>

<!-- ══ CAMERA ══ -->
<div class="panel active" id="camPanel">
  <div class="view-toggle">
    <button class="vtb active" id="vtbSide"  onclick="setCamView('side')">側面撮影中</button>
    <button class="vtb"        id="vtbFront" onclick="setCamView('front')">正面撮影中</button>
  </div>
  <div class="media-wrap">
    <video id="camVideo" autoplay muted playsinline></video>
    <canvas id="camCanvas"></canvas>
    <div class="phase-badge" id="camPhase">待機中</div>
    <button class="flip-btn" onclick="flipCamera()">カメラ反転</button>
  </div>
  <div class="controls">
    <button class="btn btn-primary" id="camStartBtn" onclick="startCamera()">カメラ開始</button>
    <button class="btn btn-danger"  id="camStopBtn"  onclick="stopCamera()" disabled>停止</button>
  </div>
  <div class="tip">
    <span class="view-tag vt-side" id="camViewTag">側面</span>
    <span id="camTipText">側面から全身が映るよう撮影（1.5〜2m）。</span>
  </div>
  <div class="metrics" id="camMetrics"></div>
</div>

<!-- ══ VIDEO ══ -->
<div class="panel" id="vidPanel">
  <div class="dual-panel">
    <div class="vid-pane">
      <div class="pane-hdr">側面</div>
      <div class="media-wrap">
        <video id="sideVid" playsinline></video>
        <canvas id="sideCanvas"></canvas>
        <div class="phase-badge" id="sidePhase">動画を選択</div>
      </div>
      <div class="mini-bar" id="sideMiniBar">
        <button onclick="stepVid(-1,'side')">&#9664;&#9664;</button>
        <button onclick="toggleVid('side')" id="sidePlayBtn">&#9654;</button>
        <button onclick="stepVid(1,'side')">&#9654;&#9654;</button>
        <div class="mini-prog" onclick="seekVid(event,'side')"><div id="sideProg"></div></div>
        <span class="mini-time" id="sideTime">0:00</span>
      </div>
      <button class="pane-btn" onclick="document.getElementById('sideFile').click()">側面動画を選択</button>
      <input type="file" id="sideFile" accept="video/*" onchange="loadVid(event,'side')">
    </div>
    <div class="vid-pane">
      <div class="pane-hdr">正面</div>
      <div class="media-wrap">
        <video id="frontVid" playsinline></video>
        <canvas id="frontCanvas"></canvas>
        <div class="phase-badge" id="frontPhase">動画を選択</div>
      </div>
      <div class="mini-bar" id="frontMiniBar">
        <button onclick="stepVid(-1,'front')">&#9664;&#9664;</button>
        <button onclick="toggleVid('front')" id="frontPlayBtn">&#9654;</button>
        <button onclick="stepVid(1,'front')">&#9654;&#9654;</button>
        <div class="mini-prog" onclick="seekVid(event,'front')"><div id="frontProg"></div></div>
        <span class="mini-time" id="frontTime">0:00</span>
      </div>
      <button class="pane-btn" onclick="document.getElementById('frontFile').click()">正面動画を選択</button>
      <input type="file" id="frontFile" accept="video/*" onchange="loadVid(event,'front')">
    </div>
  </div>

  <!-- Summary button -->
  <div style="padding:10px 14px 0;background:white">
    <button class="btn btn-summary" id="summaryBtn" onclick="showSummary()" disabled style="width:100%">
      解析サマリーを表示 📋
    </button>
  </div>

  <div class="metrics" id="vidMetrics"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.17.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.17.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-cpu@4.17.0/dist/tf-backend-cpu.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.17.0/dist/tf-converter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-layers@4.17.0/dist/tf-layers.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<script>
const SKEL=[[5,6],[5,7],[7,9],[6,8],[8,10],[5,11],[6,12],[11,12],[11,13],[13,15],[12,14],[14,16]];
// BlazePose(33点) → MoveNet互換(17点) インデックス変換テーブル
const BP_TO_MN=[[0,0],[2,1],[5,2],[7,3],[8,4],[11,5],[12,6],[13,7],[14,8],[15,9],[16,10],[23,11],[24,12],[25,13],[26,14],[27,15],[28,16]];
function remapBlazePose(bpKp){const kp=Array.from({length:17},()=>({x:0,y:0,score:0}));BP_TO_MN.forEach(([bi,mi])=>{const p=bpKp[bi];if(p)kp[mi]={x:p.x,y:p.y,score:p.score??p.visibility??0};});return kp;}
const GRADE_RANK={ng:3,warn:2,ok:1,na:0};

// ── Movement configs ──────────────────────────────────────────────────────────
const MOVES={
  squat:     {label:'スクワット',   sideTip:'全身が映るよう側面から（1.5〜2m）。',          frontTip:'全身が映るよう正面から（1.5〜2m）。',            sideKeys:['knee','trunk','hip','sym'],             frontKeys:['valgus','pelvicDrop'],            sideEval:evalGenericSide, frontEval:evalGenericFront, phaseFn:phaseSquat},
  lunge:     {label:'ランジ',       sideTip:'側面から。前後の足が両方映るよう調整。',         frontTip:'正面から。前膝外反・骨盤安定性を確認。',           sideKeys:['frontKnee','rearKnee','trunk','pelvic'],  frontKeys:['valgus','pelvicDrop','trunkLat'], sideEval:evalLungeSide,   frontEval:evalLungeFront, phaseFn:phaseLunge},
  singleLeg: {label:'片足SQ',       sideTip:'側面から全身が映るよう撮影。',                   frontTip:'正面から。ニーイン・骨盤下制を確認（最重要）。',   sideKeys:['knee','trunk'],                          frontKeys:['valgus','pelvicDrop','trunkLat'], sideEval:evalGenericSide, frontEval:evalSingleFront,  phaseFn:phaseSingleLeg},
  jump:      {label:'ジャンプ着地', sideTip:'側面から。着地時の膝屈曲・体幹を確認。',        frontTip:'正面から。着地時の両膝外反を確認（最重要）。',     sideKeys:['knee','trunk'],                          frontKeys:['lValgus','rValgus','sym'],        sideEval:evalGenericSide, frontEval:evalJumpFront,    phaseFn:phaseJump},
  cut:       {label:'切り返し',     sideTip:'側面から。接地時の膝屈曲・体幹前傾を確認。',    frontTip:'正面から。切り返し時のニーインを確認（最重要）。', sideKeys:['knee','trunk'],                          frontKeys:['valgus','trunkLat'],              sideEval:evalGenericSide, frontEval:evalCutFront,     phaseFn:phaseCut},
  stop:      {label:'ストップ',     sideTip:'側面から。制動時の膝屈曲・体幹を確認。',        frontTip:'正面から。制動時の膝外反を確認。',               sideKeys:['knee','trunk','hip'],                    frontKeys:['valgus','pelvicDrop'],            sideEval:evalGenericSide, frontEval:evalGenericFront, phaseFn:phaseStop},
};

// ── Metric definitions ────────────────────────────────────────────────────────
const MDEFS={
  knee:      {label:'膝関節角度',   fmt:v=>`${Math.round(v)}<span class="unit"> °</span>`, grade:v=> v>145?['na','立位']:v>120?['warn','やや浅い']:v>=70?['ok','良好']:['warn','深すぎ']},
  trunk:     {label:'体幹前傾角',   fmt:v=>`${Math.round(v)}<span class="unit"> °</span>`, grade:v=> v<35?['ok','良好']:v<52?['warn','前傾注意']:['ng','前傾過大']},
  hip:       {label:'股関節深さ',   fmt:v=>`<span style="font-size:20px">${v?'✅':'⚠️'}</span>`, grade:v=> v?['ok','膝以下']:['warn','膝以上']},
  sym:       {label:'左右対称性',   fmt:v=> v==null?'--':`${Math.round(v)}<span class="unit"> °差</span>`, grade:v=> v==null?['na','検出不可']:v<8?['ok','対称良好']:v<18?['warn','左右差あり']:['ng','左右差大']},
  valgus:    {label:'膝外反 FPPA',  fmt:v=>`${Math.round(v)}<span class="unit"> °</span>`, grade:v=> v>185?['ok','内反傾向']:v>170?['ok','外反なし']:v>160?['warn','軽度外反']:['ng','⚡ ACLリスク']},
  lValgus:   {label:'左膝 外反',    fmt:v=>`${Math.round(v)}<span class="unit"> °</span>`, grade:v=> v>185?['ok','内反傾向']:v>170?['ok','良好']:v>160?['warn','軽度外反']:['ng','ACLリスク']},
  rValgus:   {label:'右膝 外反',    fmt:v=>`${Math.round(v)}<span class="unit"> °</span>`, grade:v=> v>185?['ok','内反傾向']:v>170?['ok','良好']:v>160?['warn','軽度外反']:['ng','ACLリスク']},
  pelvicDrop:{label:'骨盤下制',     fmt:v=>`${Math.round(v)}<span class="unit"> °</span>`, grade:v=> v<5?['ok','安定']:v<12?['warn','軽度下制']:['ng','Trend陽性疑']},
  trunkLat:  {label:'体幹側方傾斜', fmt:v=>`${Math.round(v)}<span class="unit"> °</span>`, grade:v=> v<8?['ok','良好']:v<15?['warn','傾き注意']:['ng','過大']},
  frontKnee: {label:'前脚 膝角度',  fmt:v=>`${Math.round(v)}<span class="unit"> °</span>`, grade:v=> v>145?['na','立位']:v>120?['warn','やや浅い']:v>=60?['ok','良好']:['warn','深すぎ']},
  rearKnee:  {label:'後脚 膝角度',  fmt:v=>`${Math.round(v)}<span class="unit"> °</span>`, grade:v=> v>145?['na','立位']:v>120?['warn','やや浅い']:v>=60?['ok','良好']:['warn','深すぎ']},
  pelvic:    {label:'骨盤安定性',   fmt:v=>`${Math.round(v)}<span class="unit"> °</span>`, grade:v=> v<5?['ok','安定']:v<12?['warn','注意']:['ng','不安定']},
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function calcAngle(a,b,c){const v1x=a.x-b.x,v1y=a.y-b.y,v2x=c.x-b.x,v2y=c.y-b.y,dot=v1x*v2x+v1y*v2y,mag=Math.sqrt((v1x*v1x+v1y*v1y)*(v2x*v2x+v2y*v2y));return mag<1?0:Math.acos(Math.max(-1,Math.min(1,dot/mag)))*180/Math.PI;}
// 符号付きFPPA: 外反(ニーイン)<180°、内反(ニーアウト)>180°
// isRightLeg=true: 右脚(画面右側)  isRightLeg=false: 左脚(画面左側)
function calcFPPA(hip,knee,ank,isRightLeg){
  const angle=calcAngle(hip,knee,ank);
  if(Math.abs(ank.y-hip.y)<5)return angle;
  // 股関節-足首ラインの膝高さでのX座標
  const lineX=hip.x+(ank.x-hip.x)*(knee.y-hip.y)/(ank.y-hip.y);
  // 外反: 右脚→膝が内側(左)=lineXより小、左脚→膝が内側(右)=lineXより大
  const isValgus=isRightLeg?(knee.x<lineX):(knee.x>lineX);
  return isValgus?angle:360-angle;
}
function ok(kp,...ii){return ii.every(i=>kp[i]&&kp[i].score>.3);}
function avg(a){return a.reduce((s,v)=>s+v,0)/a.length;}
function fwdLean(sh,hip){return Math.abs(Math.atan2(Math.abs(sh.x-hip.x),Math.abs(sh.y-hip.y))*180/Math.PI);}
function latLean(kp){const mx=(kp[5].x+kp[6].x)/2,my=(kp[5].y+kp[6].y)/2,hx=(kp[11].x+kp[12].x)/2,hy=(kp[11].y+kp[12].y)/2;return Math.abs(Math.atan2(mx-hx,Math.abs(my-hy))*180/Math.PI);}
function pelvTilt(kp){return Math.abs(Math.atan2(kp[12].y-kp[11].y,Math.abs(kp[12].x-kp[11].x))*180/Math.PI);}
function bestSide(kp){const lv=ok(kp,5,11,13,15)?Math.min(kp[5].score,kp[11].score,kp[13].score,kp[15].score):0,rv=ok(kp,6,12,14,16)?Math.min(kp[6].score,kp[12].score,kp[14].score,kp[16].score):0;if(!lv&&!rv)return null;return rv>=lv?{sh:kp[6],hip:kp[12],knee:kp[14],ank:kp[16]}:{sh:kp[5],hip:kp[11],knee:kp[13],ank:kp[15]};}
function fmt(s){if(!isFinite(s))return'0:00';return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;}

// ── Eval functions ────────────────────────────────────────────────────────────
function evalGenericSide(kp){const s=bestSide(kp);if(!s)return null;const knee=calcAngle(s.hip,s.knee,s.ank),trunk=fwdLean(s.sh,s.hip),hip=s.hip.y>s.knee.y,lK=ok(kp,11,13,15)?calcAngle(kp[11],kp[13],kp[15]):null,rK=ok(kp,12,14,16)?calcAngle(kp[12],kp[14],kp[16]):null;return{knee,trunk,hip,sym:lK!=null&&rK!=null?Math.abs(lK-rK):null};}
function evalLungeSide(kp){if(!ok(kp,11,13,15)&&!ok(kp,12,14,16))return null;const lK=ok(kp,11,13,15)?calcAngle(kp[11],kp[13],kp[15]):180,rK=ok(kp,12,14,16)?calcAngle(kp[12],kp[14],kp[16]):180,s=bestSide(kp);return{frontKnee:Math.min(lK,rK),rearKnee:Math.max(lK,rK),trunk:s?fwdLean(s.sh,s.hip):0,pelvic:ok(kp,11,12)?pelvTilt(kp):0};}
function evalGenericFront(kp){const lV=ok(kp,11,13,15)?calcFPPA(kp[11],kp[13],kp[15],false):null,rV=ok(kp,12,14,16)?calcFPPA(kp[12],kp[14],kp[16],true):null,valgus=lV!=null&&rV!=null?Math.min(lV,rV):(lV??rV??180);return{valgus,pelvicDrop:ok(kp,11,12)?pelvTilt(kp):0,trunkLat:ok(kp,5,6,11,12)?latLean(kp):0};}
function evalSingleFront(kp){const sr=kp[16].y>kp[15].y,[hi,ki,ai]=sr?[12,14,16]:[11,13,15];if(!ok(kp,hi,ki,ai))return null;return{valgus:calcFPPA(kp[hi],kp[ki],kp[ai],sr),pelvicDrop:ok(kp,11,12)?pelvTilt(kp):0,trunkLat:ok(kp,5,6,11,12)?latLean(kp):0};}
function evalJumpFront(kp){const lv=ok(kp,11,13,15),rv=ok(kp,12,14,16);if(!lv&&!rv)return null;const lVal=lv?calcFPPA(kp[11],kp[13],kp[15],false):180,rVal=rv?calcFPPA(kp[12],kp[14],kp[16],true):180;return{lValgus:lVal,rValgus:rVal,sym:lv&&rv?Math.abs(lVal-rVal):null};}
function evalCutFront(kp){const lV=ok(kp,11,13,15)?calcFPPA(kp[11],kp[13],kp[15],false):null,rV=ok(kp,12,14,16)?calcFPPA(kp[12],kp[14],kp[16],true):null;return{valgus:lV!=null&&rV!=null?Math.min(lV,rV):(lV??rV??180),trunkLat:ok(kp,5,6,11,12)?latLean(kp):0};}
// ランジ専用: 後脚の膝は床に近く正面からFPPAが不正確なため、前脚のみ評価
function evalLungeFront(kp){
  const lOk=ok(kp,11,13,15),rOk=ok(kp,12,14,16);
  if(!lOk&&!rOk)return{valgus:180,pelvicDrop:0,trunkLat:0};
  const lFPPA=lOk?calcFPPA(kp[11],kp[13],kp[15],false):null;
  const rFPPA=rOk?calcFPPA(kp[12],kp[14],kp[16],true):null;
  if(!lOk)return{valgus:rFPPA,pelvicDrop:ok(kp,11,12)?pelvTilt(kp):0,trunkLat:ok(kp,5,6,11,12)?latLean(kp):0};
  if(!rOk)return{valgus:lFPPA,pelvicDrop:ok(kp,11,12)?pelvTilt(kp):0,trunkLat:ok(kp,5,6,11,12)?latLean(kp):0};
  // 前脚の特定: 後脚の膝は床に近い（画面下方=y大）
  // 脚長を基準に閾値を正規化
  const legLen=Math.max(Math.abs(kp[11].y-kp[15].y),Math.abs(kp[12].y-kp[16].y),100);
  const thresh=legLen*0.12;
  const yDiff=kp[14].y-kp[13].y; // 右膝y - 左膝y
  let valgus, frontKneeY;
  if(yDiff>thresh){      valgus=lFPPA; frontKneeY=kp[13].y; } // 左が前脚
  else if(yDiff<-thresh){ valgus=rFPPA; frontKneeY=kp[14].y; } // 右が前脚
  else                  { valgus=Math.min(lFPPA,rFPPA); frontKneeY=Math.max(kp[13].y,kp[14].y); }
  return{valgus,pelvicDrop:ok(kp,11,12)?pelvTilt(kp):0,trunkLat:ok(kp,5,6,11,12)?latLean(kp):0,frontKneeY};
}

// ── Phase functions ───────────────────────────────────────────────────────────
const HIST=18;
function phaseSquat(kp,h){const s=bestSide(kp);if(!s)return'検出中...';const a=calcAngle(s.hip,s.knee,s.ank);h.push(a);if(h.length>HIST)h.shift();if(h.length<6)return'検出中...';const d=avg(h.slice(-4))-avg(h.slice(0,5));return a>155?'立位':d<-5?'下降中 ↓':d>5?'上昇中 ↑':a<115?'ボトム':'中間位';}
function phaseLunge(kp,h){const lK=ok(kp,11,13,15)?calcAngle(kp[11],kp[13],kp[15]):180,rK=ok(kp,12,14,16)?calcAngle(kp[12],kp[14],kp[16]):180,f=Math.min(lK,rK);h.push(f);if(h.length>HIST)h.shift();if(h.length<6)return'検出中...';const d=avg(h.slice(-4))-avg(h.slice(0,5));return f>155?'立位':d<-5?'踏み込み ↓':d>5?'戻り ↑':f<115?'ボトム':'中間位';}
function phaseSingleLeg(kp,h){const sr=kp[16].y>kp[15].y,[hi,ki,ai]=sr?[12,14,16]:[11,13,15];if(!ok(kp,hi,ki,ai))return'検出中...';const a=calcAngle(kp[hi],kp[ki],kp[ai]);h.push(a);if(h.length>HIST)h.shift();if(h.length<6)return'検出中...';const d=avg(h.slice(-4))-avg(h.slice(0,5));return a>155?(sr?'右':'左')+'片足立ち':d<-5?'下降中 ↓':d>5?'上昇中 ↑':a<115?'ボトム':'中間位';}
function phaseJump(kp,h){
  const ls=kp[15].score>.25,rs=kp[16].score>.25;
  const ay=ls&&rs?(kp[15].y+kp[16].y)/2:ls?kp[15].y:rs?kp[16].y:null;
  if(ay===null){if(h.length>0)h.push(h[h.length-1]);if(h.length>HIST)h.shift();return'検出中...';}
  h.push(ay);if(h.length>HIST)h.shift();if(h.length<6)return'検出中...';
  const vel=ay-avg(h.slice(-5,-2)),hipY=(kp[11].y+kp[12].y)/2;
  if(ls&&rs&&kp[15].y<hipY&&kp[16].y<hipY)return'空中 ✈️';
  if(vel>lastCanvasW*0.012)return'⚠️ 着地 (チェック!)';
  if(avg([calcAngle(kp[11],kp[13],kp[15]),calcAngle(kp[12],kp[14],kp[16])])<140)return'着地吸収中';
  return'助走 / 立位';
}
function phaseCut(kp,h){const cx=(kp[11].x+kp[12].x)/2;h.push(cx);if(h.length>HIST)h.shift();if(h.length<6)return'検出中...';const lat=Math.abs(avg(h.slice(-3))-avg(h.slice(0,5))),lK=ok(kp,11,13,15)?calcAngle(kp[11],kp[13],kp[15]):180,rK=ok(kp,12,14,16)?calcAngle(kp[12],kp[14],kp[16]):180;return lat>(lastCanvasW*0.025)?'⚠️ 切り返し (チェック!)':Math.min(lK,rK)<140?'接地 屈曲中':'助走';}
function phaseStop(kp,h){const cy=(kp[11].y+kp[12].y)/2;h.push(cy);if(h.length>HIST)h.shift();if(h.length<6)return'検出中...';const vel=avg(h.slice(-3))-avg(h.slice(0,5)),s=bestSide(kp),knee=s?calcAngle(s.hip,s.knee,s.ank):180;return vel>15&&knee<150?'⚠️ 制動 (チェック!)':knee<140?'制動中':'助走 / 立位';}

// ── Tracking helpers ──────────────────────────────────────────────────────────
function captureThumb(canvas) {
  try {
    const off=document.createElement('canvas');
    const scale=120/canvas.width;
    off.width=120; off.height=Math.round(canvas.height*scale);
    off.getContext('2d').drawImage(canvas,0,0,off.width,off.height);
    return off.toDataURL('image/jpeg',0.6);
  } catch(e) { return null; }
}

function updateTracking(view, data, currentTime, canvas) {
  const t = tracking[view];
  Object.entries(data).forEach(([key, val]) => {
    if (typeof val !== 'number' || !isFinite(val)) return;
    if (!t[key]) {
      const img=canvas?captureThumb(canvas):null;
      t[key] = {min:val, max:val, minTime:currentTime, maxTime:currentTime, minImg:img, maxImg:img, series:[]};
    }
    if (val < t[key].min) { t[key].min=val; t[key].minTime=currentTime; if(canvas)t[key].minImg=captureThumb(canvas); }
    if (val > t[key].max) { t[key].max=val; t[key].maxTime=currentTime; if(canvas)t[key].maxImg=captureThumb(canvas); }
    // 時系列データ蓄積（約0.1秒間隔にダウンサンプリング）
    const ser=t[key].series;
    if(ser.length===0||currentTime-ser[ser.length-1].t>=0.1) ser.push({t:currentTime,v:val});
  });
  // Enable summary button
  document.getElementById('summaryBtn').disabled = false;
}

// Pinch zoom for image mode
(function(){
  const img=document.getElementById('lbImg');
  img.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      lbLastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      e.preventDefault();
    }
  },{passive:false});
  img.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      lbScale=Math.max(1,Math.min(5,lbScale*(d/lbLastDist)));
      lbLastDist=d;
      img.style.transform=`scale(${lbScale})`;
    }
  },{passive:false});
  img.addEventListener('touchend',()=>{if(lbScale<1.05){lbScale=1;img.style.transform='';}});
})();

// Return the value with worst clinical grade (min or max, whichever is worse)
function getWorst(key, t) {
  if (!t || !MDEFS[key]) return null;
  const [minCls] = MDEFS[key].grade(t.min);
  const [maxCls] = MDEFS[key].grade(t.max);
  return (GRADE_RANK[minCls]||0) >= (GRADE_RANK[maxCls]||0)
    ? {val:t.min, time:t.minTime, cls:minCls, img:t.minImg}
    : {val:t.max, time:t.maxTime, cls:maxCls, img:t.maxImg};
}

async function startCamera(){

  const video=document.getElementById('camVideo'),canvas=document.getElementById('camCanvas');
  try{
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:720},height:{ideal:1280}},audio:false});

    canvas.width=video.videoWidth||720; canvas.height=video.videoHeight||1280;

}
function stopCamera(){
  cameraRunning=false; camProcessing=false;

function loadVid(e,view){
  const file=e.target.files[0]; if(!file)return;

  if(v.src)URL.revokeObjectURL(v.src);
  tracking[view]={}; // reset tracking for this view
  v.src=URL.createObjectURL(file); v.load();
  v.addEventListener('loadedmetadata',()=>{
    c.width=v.videoWidth; c.height=v.videoHeight;
    document.getElementById(view+'MiniBar').style.display='flex';
    document.getElementById(view+'Phase').textContent='▶ 再生してください';
    updateVidBar(view);
  },{once:true});
  v.addEventListener('timeupdate',()=>updateVidBar(view));
  v.addEventListener('play',()=>{document.getElementById(view+'PlayBtn').innerHTML='&#9646;&#9646;';if(lbView===view)document.getElementById('lbPlayBtn').innerHTML='&#9646;&#9646;';vidLoop(view);});
  v.addEventListener('pause',()=>{document.getElementById(view+'PlayBtn').innerHTML='&#9654;';if(lbView===view)document.getElementById('lbPlayBtn').innerHTML='&#9654;';});

    document.getElementById(view+'PlayBtn').innerHTML='&#9654;';
    vidProc[view]=false;
    document.getElementById(view+'Phase').textContent='再生終了';
    // Auto-show summary prompt if both views have data
    if(Object.keys(tracking.side).length>0||Object.keys(tracking.front).length>0){
      document.getElementById('summaryBtn').disabled=false;
      document.getElementById('summaryBtn').textContent='解析サマリーを表示 📋 ← タップ';
    }
  });
}
function toggleVid(view){const v=document.getElementById(view+'Vid');v.paused?v.play():v.pause();}
async function vidLoop(view){
  const v=document.getElementById(view+'Vid'),c=document.getElementById(view+'Canvas');
  if(v.paused||v.ended){vidProc[view]=false;return;}
  if(!vidProc[view]&&v.readyState>=2){vidProc[view]=true;try{await processFrame(v,c,view,view);}finally{vidProc[view]=false;}}
  requestAnimationFrame(()=>vidLoop(view));
}
function stepVid(dir,view){
  const v=document.getElementById(view+'Vid'); if(!v.src||!v.duration)return;
  v.pause(); document.getElementById(view+'PlayBtn').innerHTML='&#9654;';
  v.currentTime=Math.max(0,Math.min(v.duration,v.currentTime+dir*(1/30)));
  v.addEventListener('seeked',async function f(){
    v.removeEventListener('seeked',f);
    await processFrame(v,document.getElementById(view+'Canvas'),view,view);
    updateVidBar(view);
  },{once:true});
}
function seekVid(e,view){
  const v=document.getElementById(view+'Vid'); if(!v.duration)return;
  const r=e.currentTarget.getBoundingClientRect();
  v.currentTime=((e.clientX-r.left)/r.width)*v.duration;
}
function updateVidBar(view){
  const v=document.getElementById(view+'Vid');

}

// ── Core processFrame ─────────────────────────────────────────────────────────
async function processFrame(src, canvas, view, histKey){
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  if(W>0) lastCanvasW=W;
  ctx.clearRect(0,0,W,H); ctx.drawImage(src,0,0,W,H);
  const poses=await detector.estimatePoses(src,{flipHorizontal:false});
  const isVid=(histKey!=='cam');
  const phEl=document.getElementById(isVid?view+'Phase':'camPhase');

  if(!poses.length||!poses[0].keypoints){
    if(phEl){phEl.textContent='人物を検出できません';phEl.classList.remove('alert');}
    if(isVid)updateVidMetrics(view,null);else updateCamMetrics(null);
    return;
  }
  const kp=remapBlazePose(poses[0].keypoints);
  drawSkeleton(ctx,kp);
  const m=MOVES[currentMove];
  const evalFn=view==='side'?m.sideEval:m.frontEval;
  const data=evalFn(kp);
  if(!data){
    if(phEl){phEl.textContent='骨格が見えません';phEl.classList.remove('alert');}
    if(isVid)updateVidMetrics(view,null);else updateCamMetrics(null);
    return;
  }
  drawArcs(ctx,kp,view,data);
  const phase=m.phaseFn(kp,phaseHist[histKey]);
  if(phEl){phEl.textContent=phase;phEl.classList.toggle('alert',phase.includes('⚠️'));}
  const pvEl=document.getElementById(isVid?'vid-phase-val':'cam-phase-val');
  if(pvEl)pvEl.textContent=phase;

  if(isVid){
    // Track data for summary
    const currentTime=document.getElementById(view+'Vid').currentTime;
    // ランジ: 前脚ボトム時のFPPAを記録
    if(currentMove==='lunge'&&view==='front'&&typeof data.frontKneeY==='number'){
      const fky=data.frontKneeY;
      delete data.frontKneeY; // 汎用trackerには渡さない
      const tb=tracking[view];
      if(!tb._bottom||fky>tb._bottom.kneeY){
        tb._bottom={kneeY:fky,valgus:data.valgus,time:currentTime,
          img:canvas?captureThumb(canvas):null};
      }
    }
    updateTracking(view, data, currentTime, canvas);
    updateVidMetrics(view,data);
    syncLightboxCanvas();
  } else {
    updateCamMetrics(data);
  }
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function drawSkeleton(ctx,kp){
  ctx.lineWidth=3;
  SKEL.forEach(([i,j])=>{if(kp[i].score>.25&&kp[j].score>.25){ctx.beginPath();ctx.moveTo(kp[i].x,kp[i].y);ctx.lineTo(kp[j].x,kp[j].y);ctx.strokeStyle='rgba(0,255,120,.85)';ctx.stroke();}});
  kp.forEach(p=>{if(p.score>.25){ctx.beginPath();ctx.arc(p.x,p.y,5,0,2*Math.PI);ctx.fillStyle='#ff4757';ctx.fill();}});
}
function drawArc(ctx,p1,p2,p3,deg,color){
  const r=28,a1=Math.atan2(p1.y-p2.y,p1.x-p2.x),a2=Math.atan2(p3.y-p2.y,p3.x-p2.x);
  ctx.beginPath();ctx.arc(p2.x,p2.y,r,Math.min(a1,a2),Math.max(a1,a2));ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.stroke();
  const mid=(a1+a2)/2;ctx.fillStyle=color;ctx.font='bold 14px sans-serif';ctx.shadowColor='#000';ctx.shadowBlur=4;
  ctx.fillText(`${Math.round(deg)}°`,p2.x+(r+6)*Math.cos(mid),p2.y+(r+6)*Math.sin(mid));ctx.shadowBlur=0;
}
function drawArcs(ctx,kp,view,data){
  if(view==='side'){const s=bestSide(kp);if(s&&data.knee!=null)drawArc(ctx,s.hip,s.knee,s.ank,data.knee,'#ffd700');}
  else{
    if(data.lValgus!=null&&ok(kp,11,13,15))drawArc(ctx,kp[11],kp[13],kp[15],data.lValgus,'#ff6b81');
    if(data.rValgus!=null&&ok(kp,12,14,16))drawArc(ctx,kp[12],kp[14],kp[16],data.rValgus,'#ffd700');
    if(data.valgus!=null&&data.lValgus==null){const sr=kp[16].y>kp[15].y,[hi,ki,ai]=sr?[12,14,16]:[11,13,15];if(ok(kp,hi,ki,ai))drawArc(ctx,kp[hi],kp[ki],kp[ai],data.valgus,'#ff6b81');}
  }
}

// ── Chart drawing ─────────────────────────────────────────────────────────────
function drawCharts(){
  document.querySelectorAll('[data-chart]').forEach(cv=>{
    const view=cv.dataset.view,key=cv.dataset.key;
    const entry=tracking[view]?.[key];
    if(!entry||!entry.series||entry.series.length<2)return;
    _drawChart(cv,entry.series,MDEFS[key],view);
  });
}

function _drawChart(cv,series,mdef,view){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const W=cv.offsetWidth||300,H=cv.offsetHeight||80;
  cv.width=W*dpr; cv.height=H*dpr;
  const ctx=cv.getContext('2d');
  ctx.scale(dpr,dpr);

  const ml=34,mr=6,mt=6,mb=16;
  const cW=W-ml-mr,cH=H-mt-mb;

  const vals=series.map(p=>p.v);
  const tMin=series[0].t,tMax=series[series.length-1].t;
  const dMin=Math.min(...vals),dMax=Math.max(...vals);
  const pad=Math.max((dMax-dMin)*0.25,5);
  const yMin=dMin-pad,yMax=dMax+pad;

  const tx=t=>ml+(t-tMin)/Math.max(tMax-tMin,0.001)*cW;
  const ty=v=>mt+cH-(v-yMin)/(yMax-yMin)*cH;

  // 背景
  ctx.fillStyle='#f7fafc'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='white'; ctx.beginPath();
  ctx.roundRect?ctx.roundRect(ml,mt,cW,cH,4):ctx.rect(ml,mt,cW,cH);
  ctx.fill();

  // グリッド + Y軸ラベル
  ctx.strokeStyle='rgba(0,0,0,0.07)'; ctx.lineWidth=1;
  ctx.fillStyle='#a0aec0'; ctx.font='9px -apple-system,sans-serif'; ctx.textAlign='right';
  [0,0.33,0.67,1].forEach(f=>{
    const v=yMin+(yMax-yMin)*f, y=ty(v);
    ctx.beginPath();ctx.moveTo(ml,y);ctx.lineTo(W-mr,y);ctx.stroke();
    ctx.fillText(Math.round(v)+'°',ml-3,y+3);
  });

  // X軸ラベル（時刻）
  ctx.fillStyle='#a0aec0'; ctx.textAlign='center'; ctx.font='9px -apple-system,sans-serif';
  const dur=tMax-tMin,xStep=dur<10?2:dur<30?5:10;
  for(let t=Math.ceil(tMin/xStep)*xStep;t<=tMax+0.01;t+=xStep){
    if(t<tMin)continue;
    ctx.fillText(fmt(t),Math.min(tx(t),W-mr-8),H-2);
  }

  // グレード別カラーの折れ線
  ctx.lineWidth=2; ctx.lineJoin='round'; ctx.lineCap='round';
  series.forEach((p,i)=>{
    if(i===0)return;
    const prev=series[i-1];
    const [cls]=mdef?.grade?mdef.grade(p.v):['ok'];
    ctx.strokeStyle=cls==='ng'?'#e53e3e':cls==='warn'?'#d69e2e':'#48bb78';
    ctx.beginPath();ctx.moveTo(tx(prev.t),ty(prev.v));ctx.lineTo(tx(p.t),ty(p.v));ctx.stroke();
  });

  // 最悪値マーカー
  const worst=series.reduce((a,b)=>{
    const [ac]=mdef?.grade?mdef.grade(a.v):['ok'];
    const [bc]=mdef?.grade?mdef.grade(b.v):['ok'];
    return(GRADE_RANK[bc]||0)>(GRADE_RANK[ac]||0)?b:a;
  });
  const [wCls]=mdef?.grade?mdef.grade(worst.v):['ok'];
  ctx.beginPath();ctx.arc(tx(worst.t),ty(worst.v),5,0,2*Math.PI);
  ctx.fillStyle=wCls==='ng'?'#e53e3e':wCls==='warn'?'#d69e2e':'#48bb78';
  ctx.fill(); ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.stroke();

  // タップでフレームジャンプ
  cv.onclick=e=>{
    const rect=cv.getBoundingClientRect();
    const xRel=(e.clientX-rect.left);
    const t=tMin+Math.max(0,(xRel-ml)/cW)*(tMax-tMin);
    if(t>=tMin&&t<=tMax) openVideoLightbox(view,t);
  };
}

// ── Clinical comment generation ───────────────────────────────────────────────
function generateComments(){
  const comments=[];
  const ts=tracking.side, tfront=tracking.front;

  // 膝外反
  const vKey=tfront.valgus||tfront.lValgus;
  if(vKey){
    // ランジはボトム時のFPPAを使用、それ以外は動画全体の最悪値
    const minV=currentMove==='lunge'&&tfront._bottom
      ? tfront._bottom.valgus
      : Math.min(tfront.valgus?.min??180, tfront.lValgus?.min??180, tfront.rValgus?.min??180);
    const t=tfront.valgus?.minTime??tfront.lValgus?.minTime;
    if(minV<150) comments.push({level:'ng',title:'膝外反（ニーイン）— 高リスク',text:`最大外反角度 ${Math.round(180-minV)}° のニーインが確認されました（FPPA最小値 ${Math.round(minV)}°）。ACL損傷の高リスクパターンです。股関節外転・外旋筋群（中殿筋・深層外旋6筋）の強化と着地フォームの根本的な修正が必要です。`});
    else if(minV<160) comments.push({level:'ng',title:'膝外反（ニーイン）',text:`中等度の膝外反が確認されました（FPPA最小値 ${Math.round(minV)}°）。ACL損傷リスクがあります。股関節外転・外旋筋の強化と動作再教育を推奨します。`});
    else if(minV<170) comments.push({level:'warn',title:'軽度の膝外反',text:`軽度のニーインが見られます（FPPA最小値 ${Math.round(minV)}°）。予防的な筋力強化と動作指導を推奨します。`});
  }

  // 体幹前傾
  if(ts.trunk){
    const maxT=ts.trunk.max;
    if(maxT>55) comments.push({level:'ng',title:'体幹前傾過大',text:`最大体幹前傾角 ${Math.round(maxT)}°。股関節屈筋の短縮または体幹安定筋の筋力不足が疑われます。コアスタビリティトレーニングおよびヒップフレクサーストレッチを推奨します。`});
    else if(maxT>40) comments.push({level:'warn',title:'体幹前傾',text:`やや前傾が大きいです（最大 ${Math.round(maxT)}°）。体幹安定性の強化を推奨します。`});
  }

  // 骨盤下制
  if(tfront.pelvicDrop){
    const maxD=tfront.pelvicDrop.max;
    if(maxD>12) comments.push({level:'ng',title:'Trendelenburg徴候陽性疑い',text:`最大骨盤下制 ${Math.round(maxD)}°。中殿筋の著明な筋力低下が疑われます。クラムシェル・サイドライイングアブダクションなど中殿筋強化の優先的な実施を推奨します。`});
    else if(maxD>5) comments.push({level:'warn',title:'軽度の骨盤下制',text:`骨盤下制が確認されました（最大 ${Math.round(maxD)}°）。中殿筋の筋力強化を推奨します。`});
  }

  // ジャンプ着地時の膝屈曲（スティフランディング）
  if(currentMove==='jump'&&ts.knee){
    const minK=ts.knee.min;
    if(minK>150) comments.push({level:'ng',title:'スティフランディング（硬直着地）',text:`着地時の最大膝屈曲が ${Math.round(minK)}° と不十分です。衝撃が関節に直接伝わりACL・半月板損傷リスクが高まります。ソフトランディング（膝を深く曲げた着地）のトレーニングを推奨します。`});
    else if(minK>120) comments.push({level:'warn',title:'着地時膝屈曲がやや不十分',text:`着地時の膝屈曲が浅めです（最小 ${Math.round(minK)}°）。より膝を曲げて衝撃を吸収する着地練習を推奨します。`});
  }

  // 左右対称性（正面計測を優先、なければ側面）
  const symData=tfront.sym||ts.sym;
  if(symData){
    const maxS=symData.max;
    if(maxS>18) comments.push({level:'ng',title:'左右非対称（大）',text:`膝屈曲角度の左右差が最大 ${Math.round(maxS)}° あります。患側・健側の非対称な動作パターンは再受傷リスクに繋がります。患側の機能回復と動作再教育を優先してください。`});
    else if(maxS>8) comments.push({level:'warn',title:'左右差あり',text:`左右の膝屈曲角度に差が見られます（最大 ${Math.round(maxS)}°）。均等な荷重・動作パターンを意識した練習を推奨します。`});
  }

  // 体幹側方傾斜
  if(tfront.trunkLat){
    const maxL=tfront.trunkLat.max;
    if(maxL>15) comments.push({level:'ng',title:'体幹側方傾斜過大',text:`体幹の側方傾斜が最大 ${Math.round(maxL)}°。股関節外転筋の筋力不足や体幹安定性の低下が考えられます。`});
    else if(maxL>8) comments.push({level:'warn',title:'体幹側方傾斜',text:`やや体幹の側方傾斜が見られます（最大 ${Math.round(maxL)}°）。体幹・股関節周囲の安定性強化を推奨します。`});
  }

  return comments;
}

function generateOkComments(){
  const ok=[];
  const ts=tracking.side, tfront=tracking.front;
  if(tfront.valgus&&tfront.valgus.min>170) ok.push({title:'膝外反',text:'動作全体を通じて膝外反は認められませんでした。良好な動作パターンです。'});
  if(ts.trunk&&ts.trunk.max<35) ok.push({title:'体幹前傾',text:'体幹前傾角は動作全体を通じて良好な範囲内でした。'});
  if(currentMove==='jump'){const kMin=ts.knee?.min;if(kMin!=null&&kMin<100)ok.push({title:'着地衝撃吸収',text:`着地時の膝屈曲が十分で（側面最小 ${Math.round(kMin)}°）、良好な衝撃吸収パターンが確認されました。`});}
  return ok;
}
